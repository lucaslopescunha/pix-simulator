server:
  port: 8080

spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:file:./data/pixdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    root: INFO
    com.example.pix: DEBUG
    org.springframework.boot.actuate.health: DEBUG

pix:
  webhook:
    default-url: http://localhost:9000/webhook/receive
    schedule-ms: 50000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yml
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
