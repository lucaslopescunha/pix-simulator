services:
  pix-simulator:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: pix-simulator
    ports:
      - 8080:8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:h2:file:./data/pixdb
    volumes:
      - ./data:/app/data
    restart: unless-stopped