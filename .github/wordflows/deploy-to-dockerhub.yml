name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Login no Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build e Push da imagem
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Substitua 'seu-usuario' pelo seu nome no Docker Hub ou use um Secret
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pix-simulator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pix-simulator:${{ github.sha }}
